<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Khushaank Gupta</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Libre+Baskerville:ital@0;1&family=DM+Mono:wght@300&display=swap"
        rel="stylesheet">
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --bg: #F5F3EF;
            --ink: #1a1916;
            --ink-faint: rgba(26, 25, 22, 0.18);
            --ink-mid: rgba(26, 25, 22, 0.42);
            --accent: #B8A98A;
        }

        html,
        body {
            width: 100%;
            height: 100%;
            background: var(--bg);
            color: var(--ink);
            font-family: 'Cormorant Garamond', serif;
            overflow: hidden;
            cursor: none;
        }

        /* ── Custom cursor ── */
        #cursor {
            position: fixed;
            width: 6px;
            height: 6px;
            background: var(--ink);
            border-radius: 50%;
            pointer-events: none;
            z-index: 9999;
            transition: transform 0.15s ease;
            transform: translate(-50%, -50%);
        }

        #cursor-ring {
            position: fixed;
            width: 28px;
            height: 28px;
            border: 1px solid var(--ink-mid);
            border-radius: 50%;
            pointer-events: none;
            z-index: 9998;
            transition: transform 0.35s cubic-bezier(.16, 1, .3, 1), width 0.3s, height 0.3s, border-color 0.3s;
            transform: translate(-50%, -50%);
        }

        /* ── Canvas / scene ── */
        .scene {
            position: fixed;
            inset: 0;
            display: grid;
            place-items: center;
        }

        /* ── Corner decorations ── */
        .corner {
            position: fixed;
            width: 60px;
            height: 60px;
        }

        .corner svg {
            width: 100%;
            height: 100%;
        }

        .corner--tl {
            top: 32px;
            left: 32px;
        }

        .corner--tr {
            top: 32px;
            right: 32px;
            transform: scaleX(-1);
        }

        .corner--bl {
            bottom: 32px;
            left: 32px;
            transform: scaleY(-1);
        }

        .corner--br {
            bottom: 32px;
            right: 32px;
            transform: scale(-1);
        }

        /* ── Thin horizontal rule ── */
        .h-rule {
            position: fixed;
            left: 112px;
            right: 112px;
            height: 1px;
            background: var(--ink-faint);
        }

        .h-rule--top {
            top: 64px;
        }

        .h-rule--bot {
            bottom: 64px;
        }

        /* ── Vertical side labels ── */
        .side-label {
            position: fixed;
            font-family: 'DM Mono', monospace;
            font-size: 9px;
            letter-spacing: 0.18em;
            color: var(--ink-mid);
            text-transform: uppercase;
        }

        .side-label--left {
            left: 36px;
            top: 50%;
            transform: translateY(-50%) rotate(-90deg);
            transform-origin: center center;
        }

        .side-label--right {
            right: 36px;
            top: 50%;
            transform: translateY(-50%) rotate(90deg);
            transform-origin: center center;
        }

        /* ── Top nav ── */
        .top-nav {
            position: fixed;
            top: 36px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 40px;
            align-items: center;
        }

        .top-nav a {
            font-family: 'DM Mono', monospace;
            font-size: 9px;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: var(--ink-mid);
            text-decoration: none;
            transition: color 0.2s;
            cursor: none;
        }

        .top-nav a:hover {
            color: var(--ink);
        }

        /* ── Bottom row ── */
        .bottom-row {
            position: fixed;
            bottom: 36px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 48px;
            align-items: center;
        }

        .bottom-row span {
            font-family: 'DM Mono', monospace;
            font-size: 9px;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: var(--ink-faint);
        }

        /* ── Central name block ── */
        .center-block {
            text-align: center;
            position: relative;
        }

        .name-eyebrow {
            font-family: 'DM Mono', monospace;
            font-size: 9px;
            letter-spacing: 0.3em;
            text-transform: uppercase;
            color: var(--ink-mid);
            margin-bottom: 20px;
            opacity: 0;
            animation: fadeUp 1s 0.3s forwards;
        }

        .name-main {
            font-family: 'Cormorant Garamond', serif;
            font-weight: 300;
            font-size: clamp(52px, 8vw, 108px);
            line-height: 0.95;
            letter-spacing: -0.01em;
            color: var(--ink);
            display: block;
            opacity: 0;
            animation: fadeUp 1.1s 0.5s cubic-bezier(.16, 1, .3, 1) forwards;
        }

        .name-main em {
            font-style: italic;
            color: var(--ink-mid);
        }

        .name-divider {
            width: 32px;
            height: 1px;
            background: var(--accent);
            margin: 24px auto;
            opacity: 0;
            animation: fadeUp 1s 0.9s forwards;
        }

        .name-sub {
            font-family: 'Libre Baskerville', serif;
            font-style: italic;
            font-size: clamp(13px, 1.6vw, 17px);
            color: var(--ink-mid);
            letter-spacing: 0.02em;
            opacity: 0;
            animation: fadeUp 1s 1.1s forwards;
        }

        /* ── Floating tags ── */
        .float-tag {
            position: fixed;
            font-family: 'DM Mono', monospace;
            font-size: 8.5px;
            letter-spacing: 0.18em;
            text-transform: uppercase;
            color: var(--ink-faint);
            opacity: 0;
            animation: fadeIn 1.4s 1.5s forwards;
            transition: color 0.3s;
            cursor: none;
        }

        .float-tag:hover {
            color: var(--ink-mid);
        }

        .ft-1 {
            top: 38%;
            left: 10%;
        }

        .ft-2 {
            top: 55%;
            left: 8%;
        }

        .ft-3 {
            top: 38%;
            right: 10%;
        }

        .ft-4 {
            top: 55%;
            right: 8%;
        }

        /* ── Dot grid (subtle) ── */
        .dot-grid {
            position: fixed;
            inset: 0;
            background-image: radial-gradient(circle, var(--ink-faint) 1px, transparent 1px);
            background-size: 36px 36px;
            pointer-events: none;
            opacity: 0.45;
        }

        /* ── Year mark ── */
        .year-mark {
            position: fixed;
            bottom: 38px;
            right: 120px;
            font-family: 'DM Mono', monospace;
            font-size: 9px;
            letter-spacing: 0.2em;
            color: var(--ink-faint);
        }

        /* ── Animations ── */
        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(14px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }

            to {
                opacity: 1;
            }
        }

        /* ── Hover ripple on name ── */
        .name-main {
            position: relative;
            display: inline-block;
        }

        .name-main::after {
            content: '';
            position: absolute;
            bottom: -6px;
            left: 0;
            right: 0;
            height: 1px;
            background: var(--ink);
            transform: scaleX(0);
            transform-origin: left;
            transition: transform 0.6s cubic-bezier(.16, 1, .3, 1);
        }

        .name-main:hover::after {
            transform: scaleX(1);
        }
    </style>
</head>

<body>

    <!-- Custom cursor -->
    <div id="cursor"></div>
    <div id="cursor-ring"></div>

    <!-- Dot grid -->
    <div class="dot-grid"></div>

    <!-- Corner SVG marks -->
    <div class="corner corner--tl">
        <svg viewBox="0 0 60 60" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M1 60 L1 1 L60 1" stroke="rgba(26,25,22,0.2)" stroke-width="0.8" />
            <path d="M1 1 L10 1 M1 1 L1 10" stroke="rgba(26,25,22,0.5)" stroke-width="1" />
        </svg>
    </div>
    <div class="corner corner--tr">
        <svg viewBox="0 0 60 60" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M1 60 L1 1 L60 1" stroke="rgba(26,25,22,0.2)" stroke-width="0.8" />
            <path d="M1 1 L10 1 M1 1 L1 10" stroke="rgba(26,25,22,0.5)" stroke-width="1" />
        </svg>
    </div>
    <div class="corner corner--bl">
        <svg viewBox="0 0 60 60" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M1 60 L1 1 L60 1" stroke="rgba(26,25,22,0.2)" stroke-width="0.8" />
            <path d="M1 1 L10 1 M1 1 L1 10" stroke="rgba(26,25,22,0.5)" stroke-width="1" />
        </svg>
    </div>
    <div class="corner corner--br">
        <svg viewBox="0 0 60 60" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M1 60 L1 1 L60 1" stroke="rgba(26,25,22,0.2)" stroke-width="0.8" />
            <path d="M1 1 L10 1 M1 1 L1 10" stroke="rgba(26,25,22,0.5)" stroke-width="1" />
        </svg>
    </div>

    <!-- Horizontal rules -->
    <div class="h-rule h-rule--top"></div>
    <div class="h-rule h-rule--bot"></div>

    <!-- Side labels -->
    <span class="side-label side-label--left">Portfolio&nbsp;&nbsp;·&nbsp;&nbsp;2025</span>
    <span class="side-label side-label--right">New&nbsp;Delhi&nbsp;&nbsp;·&nbsp;&nbsp;India</span>

    <!-- Top nav -->
    <nav class="top-nav">
        <a href="#">Work</a>
        <a href="#">About</a>
        <a href="#">Writing</a>
        <a href="#">Contact</a>
    </nav>

    <!-- Floating side tags -->
    <span class="float-tag ft-1">Thinker</span>
    <span class="float-tag ft-2">Builder</span>
    <span class="float-tag ft-3">Writer</span>
    <span class="float-tag ft-4">Observer</span>

    <!-- Central content -->
    <div class="scene">
        <div class="center-block">
            <p class="name-eyebrow">Est. MMXXV</p>
            <span class="name-main">Khushaank<br><em>Gupta</em></span>
            <div class="name-divider"></div>
            <p class="name-sub">Thoughtful by nature. Precise by choice.</p>
        </div>
    </div>

    <!-- Bottom row -->
    <div class="bottom-row">
        <span>← Available for select work</span>
    </div>

    <!-- Year mark -->
    <span class="year-mark">© 2025</span>

    <script>
        // Custom cursor
        const cursor = document.getElementById('cursor');
        const ring = document.getElementById('cursor-ring');
        let mx = 0, my = 0, rx = 0, ry = 0;

        document.addEventListener('mousemove', e => {
            mx = e.clientX; my = e.clientY;
            cursor.style.left = mx + 'px';
            cursor.style.top = my + 'px';
        });

        // Lag ring follow
        function animRing() {
            rx += (mx - rx) * 0.12;
            ry += (my - ry) * 0.12;
            ring.style.left = rx + 'px';
            ring.style.top = ry + 'px';
            requestAnimationFrame(animRing);
        }
        animRing();

        // Cursor grow on interactive elements
        document.querySelectorAll('a, .name-main, .float-tag').forEach(el => {
            el.addEventListener('mouseenter', () => {
                ring.style.width = '48px';
                ring.style.height = '48px';
                ring.style.borderColor = 'rgba(26,25,22,0.5)';
                cursor.style.transform = 'translate(-50%,-50%) scale(0.4)';
            });
            el.addEventListener('mouseleave', () => {
                ring.style.width = '28px';
                ring.style.height = '28px';
                ring.style.borderColor = 'rgba(26,25,22,0.35)';
                cursor.style.transform = 'translate(-50%,-50%) scale(1)';
            });
        });

        // Subtle parallax on name block
        const block = document.querySelector('.center-block');
        document.addEventListener('mousemove', e => {
            const cx = window.innerWidth / 2;
            const cy = window.innerHeight / 2;
            const dx = (e.clientX - cx) / cx;
            const dy = (e.clientY - cy) / cy;
            block.style.transform = `translate(${dx * 6}px, ${dy * 4}px)`;
        });
    </script>
</body>

</html>
